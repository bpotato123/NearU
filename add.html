<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入 NearU 好友</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #0F4C45;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            color: #212121;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 340px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #0F4C45;
            margin-bottom: 8px;
        }
        .sub {
            color: #757575;
            margin-bottom: 24px;
        }
        .nuid {
            background: #EEF1EF;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 20px 0;
        }
        .btn {
            display: block;
            background: #0F4C45;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: bold;
            margin-top: 12px;
            font-size: 15px;
        }
        .btn-outline {
            background: white;
            color: #0F4C45;
            border: 2px solid #0F4C45;
        }
        .info {
            font-size: 12px;
            color: #9E9E9E;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">NearU</div>
        <div class="sub" id="inviteText">
            有人想和你成為好友
        </div>
        <div class="nuid" id="nuidDisplay">-</div>
        <a class="btn" id="openAppBtn" href="#">
            🚀 開啟 NearU 加為好友
        </a>
        <!-- <a class="btn btn-outline" href="https://bpotato123.github.io/NearU/download.html"> 正式封測 -->
        <a class="btn btn-outline" href="https://bpotato123.github.io/NearU/Tester.html">
            📥 即刻下載 NearU APP
        </a>
        <div class="info">
            點擊後，若沒安裝將自動跳轉下載頁面
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nuid = params.get('nuid') || '';
    const name = params.get('name') || '有人';

    // 顯示 NUID
    document.getElementById('nuidDisplay').textContent = nuid || '???';

    // 顯示邀請者名稱
    document.getElementById('inviteText').textContent =
        `${name} 邀請你成為好友`;

    const fallbackUrl =
        'https://drive.google.com/drive/folders/1sMH5HUWTKv_Y4Aq3BRDj3sJ26V3g9C3l?usp=drive_link';

    // Deep Link（一般 scheme，給 iOS / 非 Chrome 瀏覽器用）
    const deepLink = 'nearu://add?nuid=' + encodeURIComponent(nuid);

    // Android Chrome 專用寫法：有裝 App 會直接開 App，
    // 沒裝會由 Chrome 自動導到 S.browser_fallback_url，不用自己猜時間，最穩定
    function buildIntentUrl() {
        return 'intent://add?nuid=' + encodeURIComponent(nuid) +
            '#Intent;scheme=nearu;package=com.franklu.chatroom;' +
            'S.browser_fallback_url=' + encodeURIComponent(fallbackUrl) + ';end';
    }

    // 點擊按鈕
    document.getElementById('openAppBtn').addEventListener('click', function (e) {
        e.preventDefault();

        const ua = navigator.userAgent;
        const isAndroidChrome = /Android/i.test(ua) && /Chrome/i.test(ua);

        if (isAndroidChrome) {
            // Android Chrome：intent:// 自帶 fallback，最可靠
            window.location.href = buildIntentUrl();
            return;
        }

        // 其他瀏覽器（iOS Safari、Android 上非 Chrome 等）：
        // 用「嘗試開 scheme + 設定逾時回退」的傳統做法
        window.location.href = deepLink;
        setTimeout(function () {
            if (!document.hidden) {
                window.location.href = fallbackUrl;
            }
        }, 1500);
    });
</script>

</body>
</html>
