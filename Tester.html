<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NearU 搶鮮體驗版</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Microsoft JhengHei",sans-serif;
}

body{
    background:#F4F8F6;
    color:#222;
}

.header{
    background:#1FA463;
    color:white;
    text-align:center;
    padding:20px 20px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:25px;
    background:white;
    color:#1FA463;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    margin:auto;
}

.header h1{
    margin-top:15px;
    font-size:34px;
}

.header p{
    margin-top:10px;
    opacity:.95;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.card h2{
    color:#1FA463;
    margin-bottom:15px;
}

.step{
    margin-bottom:20px;
}

.step span{
    display:inline-block;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#1FA463;
    color:white;
    text-align:center;
    line-height:34px;
    font-weight:bold;
    margin-right:10px;
}

.btn{
    display:block;
    text-align:center;
    background:#1FA463;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:14px;
    margin-top:12px;
    font-size:18px;
    font-weight:bold;
}

.notice{
    background:#FFF8E6;
    color:#8A5A00;
    border-left:5px solid orange;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

ul{
    padding-left:22px;
    line-height:1.8;
}

.footer{
    text-align:center;
    padding:30px;
    color:#666;
    font-size:14px;
}
</style>

</head>
<body>
<div class="header">
<h1>NearU</h1>
<p>快速分享位置．簡單聯繫好友</p>
</div>

<div class="container">
<div class="card">
<h2>✨ 功能特色</h2>
<ul>
<li>📍 即時好友定位</li>
<li>💬 快速文字訊息</li>
<li>📌 分享座標位置</li>
<li>🗺 結合Google導航</li>
</ul>
</div>
    
<div class="card">
<h2>📱 兩步驟下載體驗</h2>
<div class="step">
<h3><span>1</span>加入 Google 群組</h3>
<a class="btn" href="https://groups.google.com/d/forum/frank-testers-group">
加入 Google 群組
</a>
</div>

<div class="step">
<h3><span>2</span>下載 NearU</h3>
<a class="btn" href="https://drive.google.com/file/d/1GUCtaUPcFMj07uTzvytiZkATUZET4cRZ/view?usp=drive_link">
搶先體驗版</a>
</div>

<div class="notice">
<b>⚠ 注意</b><br><br>
請必需使用 <b>相同的 Google 帳號</b>，再開啟 Google Play 下載 NearU。
</div>

</div>
</div>

<div class="footer">
NearU Beta © Frank Lu
</div>

</body>
  </html>
